<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="KanlorOne 软件系列 — 专注文档效率的桌面工具集合。Word 文档批量排版、公文规范、科技文档模板，一次操作，全部统一。">
<meta name="keywords" content="KanlorOne, WordSuite, Word 排版, 批量排版, 公文排版, 文档工具">
<meta name="author" content="KanlorOne">
<meta property="og:title" content="KanlorOne 软件系列">
<meta property="og:description" content="专注文档效率，释放专业价值">
<meta property="og:type" content="website">
<title>KanlorOne 软件系列 — 专注文档效率</title>

<link rel="icon" href="logo/KanlorOne_WordSuite_logo.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 噪点纹理叠加层 -->
<div class="grain" aria-hidden="true"></div>

<!-- 顶部导航 -->
<header class="site-header" id="siteHeader">
  <div class="container nav-container">
    <a href="#/" class="brand-mark" aria-label="KanlorOne 首页">
      <span class="brand-mark__symbol">K</span>
      <span class="brand-mark__text">KanlorOne</span>
    </a>
    <nav class="nav" id="primaryNav" aria-label="主导航">
      <a href="#/" data-nav="home">首页</a>
      <a href="#/products" data-nav="products">产品</a>
      <a href="#/contact" data-nav="contact">联系</a>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="切换菜单" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- 主内容容器：路由渲染注入此处 -->
<main id="app" class="app-main" aria-live="polite">
  <!-- 骨架屏：数据加载前显示 -->
  <div class="skeleton-screen" id="skeleton">
    <div class="container">
      <div class="skeleton-hero">
        <div class="sk-line sk-line--xl"></div>
        <div class="sk-line sk-line--l"></div>
        <div class="sk-line sk-line--m"></div>
      </div>
    </div>
  </div>
</main>

<!-- 全局页脚 -->
<footer class="site-footer">
  <div class="container footer-grid">
    <div class="footer-brand">
      <span class="footer-brand__name">KanlorOne</span>
      <p class="footer-brand__tagline">专注文档效率，释放专业价值</p>
    </div>
    <nav class="footer-nav" aria-label="页脚导航">
      <a href="#/">首页</a>
      <a href="#/products">产品</a>
      <a href="#/contact">联系</a>
    </nav>
    <div class="footer-meta">
      <p>© <span id="footerYear">2026</span> KanlorOne. All rights reserved.</p>
      <p class="footer-meta__sub">Built as a static site · Zero build step</p>
    </div>
  </div>
</footer>

<!-- 返回顶部按钮 -->
<button class="back-to-top" id="backToTop" aria-label="返回顶部" hidden>
  <i data-lucide="arrow-up"></i>
</button>

<!-- Lucide 图标库 -->
<script src="https://unpkg.com/lucide@latest"></script>
<!-- 应用入口（ES Module） -->
<script type="module" src="js/app.js"></script>
</body>
</html>
