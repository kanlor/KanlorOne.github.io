<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanlorOne - 专业软件产品中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        
        .hero-bg { 
            background: linear-gradient(135deg, #FF3B00 0%, #E63900 100%); 
        }
        
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .modal {
            animation: modalPop 0.3s ease-out forwards;
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .accent-color { color: #FF3B00; }
        .accent-bg { background-color: #FF3B00; }
        .accent-border { border-color: #FF3B00; }
        
        @media (max-width: 640px) {
            #products-grid {
                grid-template-columns: 1fr !important;
            }
        }

        /* 产品图片全尺寸显示 */
        .product-card .product-image {
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: contain;
            background: #f9fafb;
        }
        
        .download-btn {
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 59, 0, 0.3);
        }
    </style>
</head>
<body class="bg-gray-50">

    <script src="assets/products.js"></script>
    <!-- ==================== 【集中维护区】 ==================== -->
    <script>
        // ==================== 网站全局配置 ====================
        const siteConfig = {
            companyName: "KanlorOne",
            heroTitle: "专业软件，<span class='text-orange-200'>驱动未来</span>",
            heroSubtitle: "高效 · 安全 · 持续更新"
        };

        // ==================== 首页介绍文字 ====================
        const heroIntro = {
            title: "沉淀办公经验，<span class='text-orange-200'>打造趁手工具</span>",
            subtitle: "功能精准 · 轻量高效 · 持续进化",
            buttonText: "告别机械劳作，释放核心精力"
        };

        // ==================== 联系方式（已集中维护） ====================
        const contactInfo = {
            email: "kanlorone@163.com",
            wechatId: "MToolsService",
            wechatQRCode: "assets/wechat.png",   // 二维码路径
            wechatTip: "扫码添加微信"
        };

        // ==================== 页脚信息 ====================
        const footerInfo = {
            copyright: `© 2026 KanlorOne. All Rights Reserved.`,
            links: [
                { text: "服务条款", url: "#" },
                { text: "隐私政策", url: "#" },
                { text: "关于我们", url: "#" }
            ]
        };
    </script>
    <!-- ==================== 集中维护区结束 ==================== -->

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="assets/logo.png" alt="KanlorOne" class="h-10 w-auto">
                <span class="logo-font text-3xl font-semibold tracking-tighter text-gray-900">KanlorOne</span>
            </div>
            <nav class="hidden md:flex gap-8 text-sm font-medium">
                <a href="#home" class="hover:text-orange-600 transition-colors">首页</a>
                <a href="#products" class="hover:text-orange-600 transition-colors">产品</a>
                <a href="#contact" class="hover:text-orange-600 transition-colors">联系我们</a>
            </nav>
            <button id="mobile-menu-btn" class="md:hidden text-gray-700 hover:text-orange-600 transition-colors">
                <i class="fas fa-bars text-2xl"></i>
            </button>
        </div>
        <nav id="mobile-menu" class="hidden md:hidden bg-white border-t px-6 py-4 space-y-4">
            <a href="#home" class="block text-sm font-medium hover:text-orange-600 transition-colors">首页</a>
            <a href="#products" class="block text-sm font-medium hover:text-orange-600 transition-colors">产品</a>
            <a href="#contact" class="block text-sm font-medium hover:text-orange-600 transition-colors">联系我们</a>
        </nav>
    </header>

    <!-- Hero -->
<section id="home" class="hero-bg text-white py-20 md:py-24">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-5xl md:text-6xl font-semibold tracking-tighter mb-5" id="hero-title"></h1>
            <p class="text-xl max-w-2xl mx-auto mb-3" id="hero-subtitle"></p>
            <p id="hero-cta" class="text-sm font-medium text-orange-100"></p>
        </div>
    </section>

    <!-- Products -->
    <section id="products" class="max-w-7xl mx-auto px-6 py-20">
        <div class="flex justify-between items-end mb-12">
            <h2 class="text-4xl font-semibold">我们的产品</h2>
            <a href="https://share.weiyun.com/d56f8rp2" target="_blank" class="download-btn flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all hover:scale-105">
                <i class="fas fa-download"></i>
                <span>下载 Windows 64位</span>
            </a>
        </div>
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <!-- Contact -->
    <section id="contact" class="bg-white py-20">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid md:grid-cols-2 gap-16 items-center">
                <div>
                    <h2 class="text-4xl font-semibold mb-8">联系我们</h2>
                    <div class="space-y-6 text-lg">
                        <p><i class="fas fa-envelope mr-3 accent-color"></i> <span id="email"></span></p>
                        <p><i class="fab fa-weixin mr-3 text-green-600"></i> <span id="wechat"></span></p>
                    </div>
                </div>
                <div class="text-center">
                    <img id="wechat-qrcode" src="" alt="微信二维码" class="mx-auto w-48 rounded-3xl shadow-xl">
                    <p id="wechat-tip" class="mt-4 text-gray-600"></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-12">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3">
                    <img src="assets/logo.png" alt="KanlorOne" class="h-8 w-auto brightness-75">
                    <span class="logo-font text-2xl font-semibold tracking-tighter text-white">KanlorOne</span>
                </div>
                <div id="footer-links" class="flex gap-6 text-sm"></div>
                <div id="copyright" class="text-sm"></div>
            </div>
        </div>
    </footer>

    

    <script>
        function renderHero() {
            document.getElementById('hero-title').innerHTML = heroIntro.title;
            document.getElementById('hero-subtitle').textContent = heroIntro.subtitle;
            document.getElementById('hero-cta').textContent = heroIntro.buttonText;
        }

        function renderContact() {
            document.getElementById('email').textContent = contactInfo.email;
            document.getElementById('wechat').textContent = contactInfo.wechatId;
            document.getElementById('wechat-qrcode').src = contactInfo.wechatQRCode;
            document.getElementById('wechat-tip').textContent = contactInfo.wechatTip;
        }

        function renderFooter() {
            document.getElementById('copyright').textContent = footerInfo.copyright;
            const linksContainer = document.getElementById('footer-links');
            footerInfo.links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.textContent = link.text;
                a.className = "hover:text-white transition-colors";
                linksContainer.appendChild(a);
            });
        }

        function loadProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            productsData.forEach(product => {
                const card = document.createElement('div');
                card.className = "product-card bg-white rounded-3xl overflow-hidden border border-gray-100 group flex flex-col h-full cursor-pointer";
                
                card.innerHTML = `
                    <div class="p-6 pb-4">
                        <div class="flex items-start justify-between">
                            <div>
                                <h3 class="text-lg font-bold text-gray-900">${product.nameCn || product.name}</h3>
                                <p class="text-sm text-gray-500 mt-0.5">${product.name}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-sm font-semibold text-orange-600">v${product.version}</div>
                                <div class="text-xs text-gray-400">${product.releaseDate}</div>
                            </div>
                        </div>
                    </div>
                    <div class="px-6">
                        <div class="bg-gray-50 rounded-2xl p-4">
                            <img src="${product.image}" class="product-image rounded-xl transition-transform group-hover:scale-[1.02]" alt="${product.name}">
                        </div>
                    </div>
                    <div class="p-6 pt-4">
                        <p class="text-gray-600 text-sm leading-relaxed">${product.description}</p>
                    </div>
                `;
                
                const detailUrl = `products/${product.name.replace(/\s+/g, '_')}.html`;
                card.onclick = () => { window.location.href = detailUrl; };
                
                grid.appendChild(card);
            });
        }

        function initMobileMenu() {
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            
            if (mobileMenuBtn && mobileMenu) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                    const icon = mobileMenuBtn.querySelector('i');
                    if (mobileMenu.classList.contains('hidden')) {
                        icon.className = 'fas fa-bars text-2xl';
                    } else {
                        icon.className = 'fas fa-times text-2xl';
                    }
                });
                
                mobileMenu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        mobileMenu.classList.add('hidden');
                        mobileMenuBtn.querySelector('i').className = 'fas fa-bars text-2xl';
                    });
                });
            }
        }

        // 初始化
        window.onload = () => {
            renderHero();
            renderContact();
            renderFooter();
            loadProducts();
            initMobileMenu();
        };
    </script>
</body>
</html>
